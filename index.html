<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการออกกำลังกาย</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #28a745; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; margin-top: 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏃 บันทึกกิจกรรม</h2>
    <p id="userName" style="text-align: center;">กำลังโหลดข้อมูล...</p>

    <label>เลือกประเภทกีฬา</label>
    <select id="type" onchange="updateUnit()">
        <option value="เดิน">เดิน (ก้าว)</option>
        <option value="วิ่ง">วิ่ง (กม.)</option>
        <option value="ว่ายน้ำ">ว่ายน้ำ (เมตร)</option>
        <option value="อื่นๆ">อื่นๆ (นาที)</option>
    </select>

    <label id="labelValue">จำนวนก้าว</label>
    <input type="number" id="value" placeholder="ใส่ตัวเลขที่นี่">

    <label>อัปโหลดรูปภาพกิจกรรม</label>
    <input type="file" id="imageInput" accept="image/*">

    <button onclick="sendData()">บันทึกข้อมูล</button>
    <p id="status"></p>
</div>

<script>
    // --- จุดที่ต้องแก้ 1: วาง Web App URL จาก Google Sheets ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrFYid2-OjxCfvBAAF4zmGadgUDmNXMWkVCBr8LdGEr34H3hFD-Twl5t5pROqTBFoiqA/exec"; 

    // --- จุดที่ต้องแก้ 2: วาง LIFF ID ของคุณ ---
    const MY_LIFF_ID = "2009654811-r9KVm9al"; 

    function updateUnit() {
        const type = document.getElementById('type').value;
        const label = document.getElementById('labelValue');
        if(type === "เดิน") label.innerText = "จำนวนก้าว";
        else if(type === "วิ่ง") label.innerText = "ระยะทาง (กม.)";
        else if(type === "ว่ายน้ำ") label.innerText = "ระยะทาง (เมตร)";
        else label.innerText = "เวลา (นาที)";
    }

    async function main() {
        await liff.init({ liffId: MY_LIFF_ID });
        if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            document.getElementById('userName').innerText = "สวัสดีคุณ " + profile.displayName;
        } else {
            liff.login();
        }
    }

    async function uploadImage(file) {
        const clientId = "546c745a9070940"; 
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch('https://api.imgur.com/3/image', {
            method: 'POST',
            headers: { Authorization: `Client-ID ${clientId}` },
            body: formData
        });
        const resData = await response.json();
        return resData.data.link;
    }

   async function sendData() {
        const status = document.getElementById('status');
        const fileInput = document.getElementById('imageInput');
        
        try {
            const profile = await liff.getProfile();
            status.innerText = "กำลังประมวลผล...";
            
            let imageBase64 = null;
            if (fileInput.files.length > 0) {
                status.innerText = "กำลังเตรียมรูปภาพ...";
                const file = fileInput.files[0];
                imageBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const data = {
                userId: profile.userId,
                userName: profile.displayName,
                type: document.getElementById('type').value,
                value: document.getElementById('value').value,
                imageFile: imageBase64 
            };

            status.innerText = "กำลังบันทึกข้อมูล...";
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });

            status.innerText = "✅ บันทึกสำเร็จ!";
            setTimeout(() => liff.closeWindow(), 2000);

        } catch (err) {
            status.innerText = "❌ ผิดพลาด: " + err;
        }
    }
    main();
</script>

</body>
</html>
