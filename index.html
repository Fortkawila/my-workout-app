<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการออกกำลังกาย - Mission Strong</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Sarabun', sans-serif; }
        .btn-primary { background-color: #059669; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #047857; }
        #preview { max-width: 100%; border-radius: 0.5rem; display: none; margin-top: 1rem; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">🏃 บันทึกกิจกรรม</h1>
        
        <div id="userInfo" class="mb-6 text-center text-gray-600">
            <p id="userName" class="font-semibold">กำลังโหลดข้อมูลโปรไฟล์...</p>
        </div>

        <form id="workoutForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ประเภทกิจกรรม</label>
                <select id="exerciseType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option value="เดิน">🚶 เดิน</option>
                    <option value="วิ่ง">🏃 วิ่ง</option>
                    <option value="ปั่นจักรยาน">🚴 ปั่นจักรยาน</option>
                    <option value="ว่ายน้ำ">🏊 ว่ายน้ำ</option>
                    <option value="อื่นๆ">✨ อื่นๆ</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">ระยะทาง / จำนวน (ใส่ตัวเลข)</label>
                <input type="number" id="exerciseValue" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="เช่น 5.5 หรือ 1000">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">แนบรูปภาพหลักฐาน (ถ้ามี)</label>
                <input type="file" id="imageInput" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                <img id="preview" src="" alt="Image preview">
            </div>

            <button type="button" onclick="sendData()" id="submitBtn" class="w-full btn-primary font-bold py-3 px-4 rounded-lg shadow-lg mt-6">
                🚀 บันทึกข้อมูล
            </button>
            <p id="status" class="text-center text-sm font-medium mt-2 text-gray-500"></p>
        </form>
    </div>

    <script>
        // 1. ใส่ URL จากการ Deploy (ลงท้ายด้วย /exec) ที่นี่ครับ
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwIa3HJ_FYSXWs1slaDczCuRgoBGQsFXIwjaJ1MigOX6Va5KavdpFCd6g64NxPGjyBr3g/exec"; 
        
        let base64Image = null;

        // เริ่มต้นการทำงานของ LIFF
        async function main() {
            try {
                await liff.init({ liffId: "2009654811-r9KVm9al" }); // อย่าลืมใส่ LIFF ID นะคะ
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('userName').innerText = "สวัสดีคุณ " + profile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Error:', err);
            }
        }
        main();

        // จัดการพรีวิวรูปภาพ
        document.getElementById('imageInput').onchange = function(evt) {
            const [file] = this.files;
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    base64Image = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        // ฟังก์ชันส่งข้อมูล
        async function sendData() {
            const status = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const exerciseValue = document.getElementById('exerciseValue').value;

            if (!exerciseValue) {
                alert("กรุณากรอกระยะทางหรือจำนวนก่อนค่ะ");
                return;
            }

            try {
                submitBtn.disabled = true;
                status.innerText = "⌛ กำลังส่งข้อมูล... ห้ามปิดหน้าจอนะคะ";
                
                const profile = await liff.getProfile();
                const data = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    type: document.getElementById('exerciseType').value,
                    value: exerciseValue,
                    imageFile: base64Image
                };

                // ส่งข้อมูลไปที่ Apps Script
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(data)
                });

                alert("🎉 บันทึกกิจกรรมสำเร็จแล้วค่ะ!");
                liff.closeWindow();

            } catch (error) {
                console.error('Error:', error);
                alert("เกิดข้อผิดพลาด: " + error.message);
                status.innerText = "❌ บันทึกล้มเหลว";
                submitBtn.disabled = false;
            }
        }
        async function sendData() {
    const status = document.getElementById('status');
    const fileInput = document.getElementById('imageInput');

    try {
        status.innerText = "⌛ กำลังบันทึกข้อมูล...";
        
        // อ่านไฟล์รูปภาพ
        let imageBase64 = null;
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            imageBase64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const profile = await liff.getProfile();
        const data = {
            userId: profile.userId,
            userName: profile.displayName,
            type: document.getElementById('exerciseType').value,
            value: document.getElementById('exerciseValue').value,
            imageFile: imageBase64
        };

        // --- จุดสำคัญ: คำสั่งส่งข้อมูลไปที่ Google Sheets ---
        await fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(data)
        });

        alert("🎉 บันทึกกิจกรรมสำเร็จแล้วค่ะ!");
        liff.closeWindow(); 

    } catch (error) {
        alert("เกิดข้อผิดพลาด: " + error.message);
        status.innerText = "❌ บันทึกล้มเหลว";
    }
}
    </script>
</body>
</html>
