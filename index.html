<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกกิจกรรม - Mission Strong</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">🏃 บันทึกกิจกรรม</h1>
        <div id="userInfo" class="mb-6 text-center text-gray-600">
            <p id="userName" class="font-semibold text-green-600">กำลังโหลดข้อมูลโปรไฟล์...</p>
        </div>
        <form id="workoutForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">เลือกประเภทกีฬา</label>
                <select id="exerciseType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border text-lg">
                    <option value="เดิน">เดิน (ก้าว)</option>
                    <option value="วิ่ง">วิ่ง (กม.)</option>
                    <option value="ปั่นจักรยาน">ปั่นจักรยาน (กม.)</option>
                    <option value="ว่ายน้ำ">ว่ายน้ำ (เมตร)</option>
                    <option value="อื่นๆ">อื่นๆ (นาที)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ระบุตัวเลข</label>
                <input type="number" id="exerciseValue" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border text-lg" placeholder="ใส่ตัวเลขที่นี่">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">อัปโหลดรูปภาพกิจกรรม</label>
                <input type="file" id="imageInput" accept="image/*" class="mt-1 block w-full text-sm">
            </div>
            <button type="button" onclick="sendData()" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-4 rounded-lg shadow-lg mt-6 text-lg">
                บันทึกข้อมูล
            </button>
            <p id="status" class="text-center text-sm font-medium mt-2 text-gray-500"></p>
        </form>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwAzkOEjLqm8ep1M-fqkr9AOFONHQTsvw8imbJMvv-kQnWbnztB5znXsbc8Qy3gOmt_IQ/exec"; 
        let base64Image = null;

        async function main() {
            try {
                await liff.init({ liffId: "2009654811-r9KVm9a1" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('userName').innerText = "สวัสดีคุณ " + profile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Error:', err);
            }
        }
        main();

        document.getElementById('imageInput').onchange = function(evt) {
            const file = evt.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => base64Image = e.target.result;
                reader.readAsDataURL(file);
            }
        };

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const val = document.getElementById('exerciseValue').value;
            if (!val) { alert("กรุณาใส่ตัวเลขก่อนค่ะ"); return; }

            try {
                btn.disabled = true;
                status.innerText = "⌛ กำลังบันทึกข้อมูล...";
                const profile = { userId: "guest", displayName: "คุณหมอ (Manual)" };
                const data = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    type: document.getElementById('exerciseType').value,
                    value: val,
                    imageFile: base64Image
                };

                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                alert("🎉 บันทึกสำเร็จแล้วค่ะ!");
                liff.closeWindow();
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
                btn.disabled = false;
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
