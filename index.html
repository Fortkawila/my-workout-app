<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกกิจกรรม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-gray-100">
    <div class="max-w-md mx-auto bg-white rounded-xl p-6 shadow-lg">
        <h1 class="text-xl font-bold text-center mb-4">🏃 บันทึกกิจกรรม</h1>
        <p id="userName" class="text-center mb-4 text-green-600 font-bold">กำลังโหลดชื่อ...</p>
        
        <div class="space-y-4">
            <select id="exerciseType" class="w-full p-2 border rounded">
                <option value="เดิน">เดิน (ก้าว)</option>
                <option value="วิ่ง">วิ่ง (กม.)</option>
            </select>
            <input type="number" id="exerciseValue" class="w-full p-2 border rounded" placeholder="ใส่ตัวเลขที่นี่">
            <input type="file" id="imageInput" accept="image/*" class="w-full">
            <button onclick="sendData()" id="submitBtn" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">บันทึกข้อมูล</button>
            <p id="status" class="text-center text-sm mt-2"></p>
        </div>
    </div>

    <script>
        // 1. ใส่ URL ของคุณหมอ (จากรูป image_1f45e3.png)
        const scriptUrl = "https://script.google.com/macros/s/AKfycbw3_ZaaksOAk7uIjcX8o2IOet2HZ7NioxM12tu30IbGmGNnwNyHmPpZ1be-Z-oeeHwxBg/exec"; 
        
        let base64Image = null;

        // เริ่มต้น LIFF
        async function main() {
            await liff.init({ liffId: "2009654811-r9KVm9a1" }); // LIFF ID ของคุณหมอ
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = "สวัสดีคุณ " + profile.displayName;
            } else {
                liff.login();
            }
        }
        main();

        // จัดการรูป
        document.getElementById('imageInput').onchange = function() {
            const reader = new FileReader();
            reader.onload = e => base64Image = e.target.result;
            reader.readAsDataURL(this.files[0]);
        };

        // --- ส่วนที่ของคุณหมอขาดไปคือตรงนี้ครับ! ---
        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            try {
                btn.disabled = true;
                status.innerText = "⌛ กำลังบันทึก...";
                const profile = await liff.getProfile();
                
                const data = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    type: document.getElementById('exerciseType').value,
                    value: document.getElementById('exerciseValue').value,
                    imageFile: base64Image
                };

                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                alert("บันทึกสำเร็จแล้วค่า!");
                liff.closeWindow();
            } catch (e) {
                alert("พลาดตรงนี้: " + e.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
